# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - uche-okwonko

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client and build
        run: npm run build
        env:
          # prisma.config.ts reads this at generation time.
          # prisma generate does not connect to the DB; a valid-format URL is enough.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Only ship what is needed at runtime — skip dev tooling and source files
          path: |
            dist/
            node_modules/
            package.json
            package-lock.json
            prisma/schema.prisma
            prisma/migrations/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8EB430B9D1CB4763879CD3EF4386B2D6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1EB0F3DB7A164A438DC7ACB39278062E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1FED776E7E574788AD8DBB06FC87E12B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'uche-okwonko'
          slot-name: 'Production'
          package: .
